<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эмоцияларды аулау - Ойын</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            color: white;
            margin: 0;
            overflow: hidden; /* Скролл болмауы үшін */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui-container {
            position: absolute;
            top: 10px;
            text-align: center;
            width: 100%;
            z-index: 10;
            pointer-events: none; /* Түймелерге кедергі жасамау */
        }

        #task-text {
            font-size: 28px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid yellow;
        }

        #score-text {
            font-size: 22px;
            margin-top: 5px;
        }

        canvas {
            background-color: #34495e;
            display: block;
        }

        #final-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 20;
        }

        #final-screen button {
            padding: 15px 30px;
            font-size: 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="task-text">Жүктелуде...</div>
    <div id="score-text">Ұпай: <span id="score">0</span> / Уақыт: <span id="time">30</span>с</div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="final-screen">
    <h1>Ойын аяқталды! 🎉</h1>
    <p id="final-score-text"></p>
    <button onclick="location.reload()">Қайта бастау</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const taskEl = document.getElementById('task-text');
    const finalScreen = document.getElementById('final-screen');
    const finalScoreEl = document.getElementById('final-score-text');

    // Экран өлшемі
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Эмоциялар дерекқоры
    const emotions = [
        { emoji: '😊', type: 'Қуаныш' },
        { emoji: '😢', type: 'Мұң' },
        { emoji: '😡', type: 'Ашу' },
        { emoji: '😨', type: 'Қорқыныш' },
        { emoji: '😮', type: 'Таңғалу' }
    ];

    let items = [];
    let score = 0;
    let timeLeft = 30; // Ойын уақыты (секунд)
    let currentTask = '';
    let gameInterval, timerInterval;
    let isGameOver = false;

    // Нысан (Смайлик) класы
    class EmotionItem {
        constructor() {
            const emo = emotions[Math.floor(Math.random() * emotions.length)];
            this.emoji = emo.emoji;
            this.type = emo.type;
            this.size = 60;
            this.x = Math.random() * (canvas.width - this.size);
            this.y = Math.random() * (canvas.height - this.size);
            this.speedX = (Math.random() - 0.5) * 6; // Жылдамдық (-3-тен 3-ке дейін)
            this.speedY = (Math.random() - 0.5) * 6;
        }

        draw() {
            ctx.font = `${this.size}px Arial`;
            ctx.textBaseline = 'top';
            ctx.fillText(this.emoji, this.x, this.y);
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            // Қабырғадан секіру
            if (this.x + this.size > canvas.width || this.x < 0) this.speedX *= -1;
            if (this.y + this.size > canvas.height || this.y < 0) this.speedY *= -1;
        }

        isClicked(mouseX, mouseY) {
            return mouseX >= this.x && mouseX <= this.x + this.size &&
                   mouseY >= this.y && mouseY <= this.y + this.size;
        }
    }

    // Жаңа тапсырма беру
    function setNewTask() {
        const uniqueEmotions = [...new Set(emotions.map(e => e.type))];
        currentTask = uniqueEmotions[Math.floor(Math.random() * uniqueEmotions.length)];
        taskEl.innerText = `Аула: Тек "${currentTask}"!`;
    }

    // Нысандарды жасау
    function initItems() {
        items = [];
        for (let i = 0; i < 15; i++) { // Экрандағы смайликтер саны
            items.push(new EmotionItem());
        }
    }

    // Ойын циклі (Анимация)
    function gameLoop() {
        if (isGameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height); // Экранды тазалау

        items.forEach(item => {
            item.update();
            item.draw();
        });

        requestAnimationFrame(gameLoop);
    }

    // Тышқанды (немесе саусақты) басуды өңдеу
    canvas.addEventListener('mousedown', (event) => {
        if (isGameOver) return;

        const rect = canvas.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;

        for (let i = items.length - 1; i >= 0; i--) { // Жоғарғысын бірінші тексеру
            if (items[i].isClicked(mouseX, mouseY)) {
                if (items[i].type === currentTask) {
                    score += 10;
                    // Дұрыс болса, орнына жаңасын жасау
                    items[i] = new EmotionItem();
                } else {
                    score -= 5; // Қате болса, ұпай шегеру
                }
                scoreEl.innerText = score;
                break; // Тек бір смайликті басу
            }
        }
    });

    // Ойынды аяқтау
    function gameOver() {
        isGameOver = true;
        clearInterval(gameInterval);
        clearInterval(timerInterval);
        finalScreen.style.display = 'block';
        finalScoreEl.innerText = `Сенің нәтижең: ${score} ұпай!`;
        if (score > 100) finalScoreEl.innerText += " Жарайсың, нағыз эмоция аулаушысы! 🏆";
    }

    // Ойынды бастау
    initItems();
    setNewTask();
    gameLoop();

    // Тапсырманы әр 5 секунд сайын ауыстыру (Мотивациялық көрсеткіш)
    gameInterval = setInterval(setNewTask, 5000);

    // Таймер
    timerInterval = setInterval(() => {
        timeLeft--;
        timeEl.innerText = timeLeft;
        if (timeLeft <= 0) gameOver();
    }, 1000);

</script>

</body>
</html>
